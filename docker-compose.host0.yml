services:
  demo:
    image: ${APP_DOCKER_IMAGE:?}:latest
    container_name: demo
    env_file: .env.demo
  ustc:
    image: ${APP_DOCKER_IMAGE:?}:latest
    container_name: ustc
    env_file: .env.ustc
  xhef:
    image: ${APP_DOCKER_IMAGE:?}:latest
    container_name: xhef
    env_file: .env.xhef
  nginx:
    image: m.daocloud.io/docker.io/library/nginx:latest
    container_name: nginx
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx.proxy.conf:/etc/nginx/proxy_params.conf:ro
      - ./nginx.ssl.conf:/etc/nginx/ssl_params.conf:ro
      - ./certbot:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    ports:
      - "443:443"
      - "80:80"
    depends_on:
      - yuantu
      - demo
      - ustc
      - xhef
