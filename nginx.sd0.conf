# yqd.songdingchina.org
server {
    include                 /etc/nginx/ssl_params.conf;
    server_name             yqd.songdingchina.org;
    ssl_certificate         /etc/letsencrypt/live/yqd.songdingchina.org/fullchain.pem;
    ssl_certificate_key     /etc/letsencrypt/live/yqd.songdingchina.org/privkey.pem;

    location / {
        proxy_pass "http://yqd:3000/";
        include /etc/nginx/proxy_params.conf;
    }

    error_page   500 502 503 504  /50x.html;
}

# sylp.songdingchina.org
server {
    include                 /etc/nginx/ssl_params.conf;
    server_name             sylp.songdingchina.org;
    ssl_certificate         /etc/letsencrypt/live/sylp.songdingchina.org/fullchain.pem;
    ssl_certificate_key     /etc/letsencrypt/live/sylp.songdingchina.org/privkey.pem;

    location / {
        proxy_pass "http://sylp:3000/";
        include /etc/nginx/proxy_params.conf;
    }

    error_page   500 502 503 504  /50x.html;
}

# Redirect http to https & support Let's Encrypt challenge
server {
    listen                  80;
    listen                  [::]:80;
    server_name             localhost;

    # https://letsencrypt.org/docs/challenge-types/#http-01-challenge
    # Also see docker-compose.yml.
    location /.well-known/acme-challenge/ {
        root                /var/www/certbot;
    }

    location / {
        return              301 https://$host$request_uri;
    }
}
