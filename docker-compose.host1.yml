services:
  yuantu:
    image: ${APP_IMAGE_BASE_NAME:?}.yuantu:latest
    container_name: yuantu
    env_file: .env.yuantu
  # The container for the "x" white label deployment. Docker doesn't allow 
  # single letter container names.
  xx:
    image: ${APP_IMAGE_BASE_NAME:?}.x:latest
    container_name: xx
    env_file: .env.x
  nginx:
    image: m.daocloud.io/docker.io/library/nginx:latest
    container_name: nginx
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx.proxy.conf:/etc/nginx/proxy_params.conf:ro
      - ./nginx.ssl.conf:/etc/nginx/ssl_params.conf:ro
      - ./certbot:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    ports:
      - "443:443"
      - "80:80"
    depends_on:
      - yuantu
      - xx
