# Redirect www.yuantuapp.com to yuantuapp.com
server {
    include                 /etc/nginx/ssl_params.conf;
    server_name             www.yuantuapp.com;
    ssl_certificate         /etc/letsencrypt/live/www.yuantuapp.com/fullchain.pem;
    ssl_certificate_key     /etc/letsencrypt/live/www.yuantuapp.com/privkey.pem;

    location / {
        return              301 https://yuantuapp.com$request_uri;
    }
}

