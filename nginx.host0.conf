# demo.yuantuapp.com
server {
    include                 /etc/nginx/ssl_params.conf;
    server_name             demo.yuantuapp.com;
    ssl_certificate         /etc/letsencrypt/live/demo.yuantuapp.com/fullchain.pem;
    ssl_certificate_key     /etc/letsencrypt/live/demo.yuantuapp.com/privkey.pem;

    location / {
        proxy_pass "http://demo:3000/";
        include /etc/nginx/proxy_params.conf;
    }

    error_page   500 502 503 504  /50x.html;
}

