# Configure Github Actions seretes and variables at
#   Settings > Secrets and Variables > Actions:
#
#   DOCKER_REPO_URL
#   DOCKER_REPO_USERNAME
#   DOCKER_REPO_PASSWORD: The repository information for the Docker container to
#     be pushed.
#
#   REMOTE_APP_DOCKER_IMAGE: The Docker image name to be pushed to the 
#     production server.
#   LOCAL_APP_DOCKER_IMAGE: The Docker image name to be pulled from the
#     production server. Because it's possible that the Docker repo is hoseted 
#     with in the same VPC of the production server, the local Docker image name
#     may use the repo's internal domain name to speed up the pull.
#
#   HOST0_HOSTNAME
#   HOST0_SSH_USERNAME
#   HOST0_SSH_PRIVATE_KEY: Information to SSH into the host0 server.
#   HOST1_HOSTNAME
#   HOST1_SSH_USERNAME
#   HOST1_SSH_PRIVATE_KEY: Information to SSH into the host1 server.
#
# Finally, push to main to trigger this Github Action.
#
name: Deploy Docker

permissions:
  contents: read

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: yuanjian
          POSTGRES_PASSWORD: password
          POSTGRES_DB: yuanjian
        ports:
          - 5432:5432
        # Wait for the database to be ready before running tests.
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'yarn'

    - name: Install Dependencies
      run: yarn install --frozen-lockfile

    - name: Setup Database and Environment
      run: |
        echo "DATABASE_URI=postgres://yuanjian:password@localhost:5432/yuanjian" > .env
        echo "NEXTAUTH_SECRET=123" >> .env
        npx ts-node --require tsconfig-paths/register tools/migrateDatabase.ts

    - name: Run Tests
      run: yarn test

    - name: Generate Demo Data
      run: yarn gen-demo-data

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker
      run: echo "${{ secrets.DOCKER_REPO_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_REPO_USERNAME }} ${{ vars.DOCKER_REPO_URL }} --password-stdin

    # Build and push the Docker image.
    # Uses GitHub Actions native caching (`type=gha`) to significantly reduce
    # Docker compile time by caching layers directly in the GHA cache backend.
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ vars.REMOTE_APP_DOCKER_IMAGE }}:latest
        target: runner
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy-host0:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Install SSH client
      run: sudo apt-get install -y openssh-client

    - name: Add SSH key
      uses: shimataro/ssh-key-action@v2
      with:
        key: ${{ secrets.HOST0_SSH_PRIVATE_KEY }}
        known_hosts: ${{ vars.HOST0_HOSTNAME }}
        config: |
          Host ${{ vars.HOST0_HOSTNAME }}
            User ${{ secrets.HOST0_SSH_USERNAME }}
            StrictHostKeyChecking no

    - name: Deploy to server
      run: |
        ssh ${{ secrets.HOST0_SSH_USERNAME }}@${{ vars.HOST0_HOSTNAME }} << 'EOF'
          set -e
          cd ~/app

          echo ">>> Pulling docker images"
          docker compose pull

          echo ">>> Extracting docker-compose.host0.yml & nginx.host0.conf"
          docker rm temp_extract || true
          docker create --name temp_extract ${{ vars.LOCAL_APP_DOCKER_IMAGE }}:latest
          docker cp temp_extract:/app/docker-compose.host0.yml ./docker-compose.yml
          docker cp temp_extract:/app/nginx.host0.conf ./nginx.conf
          docker cp temp_extract:/app/nginx.proxy.conf ./nginx.proxy.conf
          docker cp temp_extract:/app/nginx.ssl.conf ./nginx.ssl.conf
          docker rm temp_extract

          echo ">>> Restarting Docker containers"
          docker compose down --remove-orphans
          docker compose up -d

          echo ">>> Waiting for containers to boot up"
          sleep 5

          echo ">>> Migrating yuantu database"
          source .env
          curl --fail-with-body -X POST -H "Authorization: Bearer ${INTEGRATION_AUTH_TOKEN}" ${NEXTAUTH_URL}/api/v1/migration.migrateDatabase

          echo ">>> Migrating ustc database"
          source .env.ustc
          curl --fail-with-body -X POST -H "Authorization: Bearer ${INTEGRATION_AUTH_TOKEN}" ${NEXTAUTH_URL}/api/v1/migration.migrateDatabase

          echo ">>> Migrating xhef database"
          source .env.xhef
          curl --fail-with-body -X POST -H "Authorization: Bearer ${INTEGRATION_AUTH_TOKEN}" ${NEXTAUTH_URL}/api/v1/migration.migrateDatabase

          echo ">>> Migrating demo database"
          source .env.demo
          curl --fail-with-body -X POST -H "Authorization: Bearer ${INTEGRATION_AUTH_TOKEN}" ${NEXTAUTH_URL}/api/v1/migration.migrateDatabase

          echo ">>> Prune Docker images"
          docker image prune -f
        EOF

  deploy-host1:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Install SSH client
      run: sudo apt-get install -y openssh-client

    - name: Add SSH key
      uses: shimataro/ssh-key-action@v2
      with:
        key: ${{ secrets.HOST1_SSH_PRIVATE_KEY }}
        known_hosts: ${{ vars.HOST1_HOSTNAME }}
        config: |
          Host ${{ vars.HOST1_HOSTNAME }}
            User ${{ secrets.HOST1_SSH_USERNAME }}
            StrictHostKeyChecking no

    - name: Deploy to server
      run: |
        ssh ${{ secrets.HOST1_SSH_USERNAME }}@${{ vars.HOST1_HOSTNAME }} << 'EOF'
          set -e
          cd ~/app

          echo ">>> Pulling docker images"
          docker compose pull

          echo ">>> Extracting docker-compose.host1.yml & nginx.host1.conf"
          docker rm temp_extract || true
          docker create --name temp_extract ${{ vars.LOCAL_APP_DOCKER_IMAGE }}:latest
          docker cp temp_extract:/app/docker-compose.host1.yml ./docker-compose.yml
          docker cp temp_extract:/app/nginx.host1.conf ./nginx.conf
          docker cp temp_extract:/app/nginx.proxy.conf ./nginx.proxy.conf
          docker cp temp_extract:/app/nginx.ssl.conf ./nginx.ssl.conf
          docker rm temp_extract

          echo ">>> Restarting Docker containers"
          docker compose down --remove-orphans
          docker compose up -d

          echo ">>> Waiting for containers to boot up"
          sleep 5

          echo ">>> Migrating x database"
          source .env.x
          curl --fail-with-body -X POST -H "Authorization: Bearer ${INTEGRATION_AUTH_TOKEN}" ${NEXTAUTH_URL}/api/v1/migration.migrateDatabase

          echo ">>> Prune Docker images"
          docker image prune -f
        EOF
