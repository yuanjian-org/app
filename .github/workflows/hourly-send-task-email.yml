name: Hourly Send Tasks And Emails

permissions: {}

on:
  schedule:
    - cron: "10 * * * *"
  workflow_dispatch:

jobs:
  run_scheduled_task:
    runs-on: ubuntu-latest

    steps:
      - name: Create auto tasks
        run: |
          curl -f -X POST -H "Authorization: Bearer ${{ secrets.INTEGRATION_AUTH_TOKEN }}" https://${{ vars.SERVER_HOSTNAME }}/api/v1/cron.createAutoTasks
      
      - name: Send scheduled emails
        run: |
          curl -f -X POST -H "Authorization: Bearer ${{ secrets.INTEGRATION_AUTH_TOKEN }}" https://${{ vars.SERVER_HOSTNAME }}/api/v1/cron.sendScheduledNotifications
