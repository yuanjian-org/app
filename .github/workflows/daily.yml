name: Daily Cron Jobs

permissions: {}

on:
  schedule:
    # Runs at 00:00 Beijing Time (UTC+8) every day.
    - cron: "0 16 * * *"
  workflow_dispatch:

jobs:
  run_scheduled_task:
    runs-on: ubuntu-latest

    steps:
      - name: Reset demo data
        run: |
          curl -X POST -H "Authorization: Bearer ${{ secrets.INTEGRATION_AUTH_TOKEN }}" https://${{ vars.SERVER_HOSTNAME }}/api/v1/cron.resetDemoData
