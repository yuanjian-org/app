name: Run Cron Tasks

on:
  workflow_call:
    inputs:
      cron_tasks:
        description: 'Space-separated list of cron tasks to run (e.g. cron.syncMeetings)'
        required: true
        type: string
    secrets:
      SERVER_SSH_PRIVATE_KEY:
        required: true
      SERVER_SSH_USERNAME:
        required: true

jobs:
  run_tasks:
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJSON(vars.DEPLOYMENT_MATRIX || '{"include":[{"host_id":"host0","hostname_var":"HOSTNAME0","env_files":".env .env.ustc .env.xhef .env.demo"},{"host_id":"host1","hostname_var":"HOSTNAME1","env_files":".env.x"}]}') }}

    steps:
    - name: Install SSH client
      run: sudo apt-get install -y openssh-client

    - name: Add SSH key
      uses: shimataro/ssh-key-action@v2
      with:
        key: ${{ secrets.SERVER_SSH_PRIVATE_KEY }}
        known_hosts: ${{ vars[matrix.hostname_var] }}
        config: |
          Host ${{ vars[matrix.hostname_var] }}
            User ${{ secrets.SERVER_SSH_USERNAME }}
            StrictHostKeyChecking no

    - name: Run Tasks on Server
      run: |
        ssh ${{ secrets.SERVER_SSH_USERNAME }}@${{ vars[matrix.hostname_var] }} << 'EOF'
          set -e
          cd ~/app

          for env_file in ${{ matrix.env_files }}; do
            if [ ! -f "$env_file" ]; then
              echo ">>> Skipping $env_file (not found)"
              continue
            fi

            echo ">>> Loading $env_file"
            # Safely extract specific variables without evaluating the entire .env file with xargs
            INTEGRATION_AUTH_TOKEN=$(sudo grep '^INTEGRATION_AUTH_TOKEN=' "$env_file" | sed -e 's/^INTEGRATION_AUTH_TOKEN=//' | sed -e "s/^'//;s/'$//" | sed -e 's/^"//;s/"$//')
            NEXTAUTH_URL=$(sudo grep '^NEXTAUTH_URL=' "$env_file" | sed -e 's/^NEXTAUTH_URL=//' | sed -e "s/^'//;s/'$//" | sed -e 's/^"//;s/"$//')

            if [ -z "$INTEGRATION_AUTH_TOKEN" ] || [ -z "$NEXTAUTH_URL" ]; then
              echo ">>> Skipping $env_file (INTEGRATION_AUTH_TOKEN or NEXTAUTH_URL missing)"
              continue
            fi

            for task in ${{ inputs.cron_tasks }}; do
              echo ">>> Running $task for $env_file"
              curl --fail-with-body -X POST -H "Authorization: Bearer ${INTEGRATION_AUTH_TOKEN}" "${NEXTAUTH_URL}/api/v1/${task}"
            done
          done
        EOF
